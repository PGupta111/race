# /etc/nginx/sites-available/bigred
# Symlink to /etc/nginx/sites-enabled/ to activate.

upstream bigred_app {
    server 127.0.0.1:8000;
    keepalive 32;
}

# Redirect plain HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/bigred.crt;
    ssl_certificate_key /etc/nginx/ssl/bigred.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Allow up to 10 MB uploads (match MAX_UPLOAD_MB + headroom)
    client_max_body_size 12M;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;

    # Serve uploads (photos, video clips) directly — bypasses gunicorn for large files
    location /uploads/ {
        alias /home/user/race/uploads/;
        expires 1h;
        add_header Cache-Control "public";
    }

    # Serve static assets with long-lived cache
    location /static/ {
        alias /home/user/race/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # WebSocket endpoint — must pass Upgrade headers
    location /ws {
        proxy_pass         http://bigred_app;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 86400s;   # keep WS alive across long events
    }

    # Everything else → gunicorn/uvicorn
    location / {
        proxy_pass         http://bigred_app;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
