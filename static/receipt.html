<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Finish Receipt · Big Red Command Center</title>
  <meta name="description" content="Official finish receipt and finisher certificate.">
  <link rel="stylesheet" href="/static/styles.css">
  <style>
    .receipt-card {
      max-width: 520px;
      margin: 32px auto;
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-xl);
      overflow: hidden;
      box-shadow: var(--shadow-lg);
      animation: scaleIn 0.5s var(--ease-out) both;
    }

    .receipt-top {
      background: var(--grad-red);
      padding: 28px 32px;
      color: white;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .receipt-top::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 60%);
      pointer-events: none;
    }

    .receipt-top h1 {
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 4px;
      opacity: 0.8;
      position: relative;
    }

    .receipt-emblem {
      font-size: 2.5rem;
      margin: 8px 0;
    }

    .bib-big {
      font-size: 6rem;
      font-weight: 900;
      color: var(--red);
      font-variant-numeric: tabular-nums;
      letter-spacing: 8px;
      text-shadow: 0 0 40px rgba(230,57,70,0.4);
      line-height: 1;
    }

    .time-big {
      font-size: 2.6rem;
      font-weight: 700;
      color: var(--green);
      font-family: 'JetBrains Mono', monospace;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 0 20px rgba(0,214,143,0.3);
    }

    .receipt-body { padding: 28px 32px; }

    .receipt-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 13px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      font-size: 0.9rem;
    }
    .receipt-row:last-child { border-bottom: none; }
    .receipt-label { color: var(--muted); font-weight: 500; }
    .receipt-value { font-weight: 600; }

    .rank-display {
      font-size: 2rem;
      font-weight: 900;
    }

    .share-actions {
      display: flex;
      gap: 8px;
      margin-top: 20px;
    }

    .share-actions .btn { flex: 1; justify-content: center; }

    .qr-area {
      text-align: center;
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid rgba(255,255,255,0.04);
    }

    .qr-canvas {
      background: white;
      border-radius: 8px;
      padding: 8px;
      display: inline-block;
    }

    @media print {
      .header, .no-print, .nav, .share-actions { display: none !important; }
      body { background: #fff !important; color: #000 !important; }
      body::before { display: none !important; }
      .receipt-card { background: #fff !important; border: 2px solid #333 !important; backdrop-filter: none !important; box-shadow: none !important; }
      .bib-big  { color: #B31B1B !important; text-shadow: none !important; }
      .time-big { color: #006400 !important; text-shadow: none !important; }
      .receipt-row { border-color: #ddd !important; }
      .receipt-top { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    }
  </style>
</head>
<body>

<header class="header">
  <div class="live-dot"></div>
  <div>
    <div class="header-brand">🏁 BIG RED COMMAND CENTER</div>
    <div class="header-sub">Finish Receipt</div>
  </div>
  <nav class="nav">
    <a href="/">Dashboard</a>
    <a href="/results">Results</a>
  </nav>
</header>

<div class="container">
  <div id="loading" class="loading" style="padding:80px;font-size:1rem">
    <div style="font-size:2rem;margin-bottom:12px;animation: spin 1s linear infinite;display:inline-block">⏳</div>
    <div>Loading receipt…</div>
  </div>
  <div id="receipt-card" class="receipt-card" style="display:none">

    <div class="receipt-top">
      <h1>🏁 BIG RED FINISH RECEIPT</h1>
      <div class="receipt-emblem">🏅</div>
      <div style="font-size:.78rem;opacity:.7" id="r-validated">Validated</div>
    </div>

    <div class="receipt-body">
      <div style="text-align:center;margin-bottom:16px">
        <div class="bib-big" id="r-bib">—</div>
        <div class="time-big" id="r-time" style="margin-top:8px">—</div>
        <div style="color:var(--muted);font-size:.85rem;margin-top:6px;font-weight:600" id="r-rank">—</div>
      </div>

      <div class="receipt-row">
        <span class="receipt-label">Name</span>
        <span class="receipt-value" id="r-name">—</span>
      </div>
      <div class="receipt-row">
        <span class="receipt-label">Category</span>
        <span class="receipt-value" id="r-cat">—</span>
      </div>
      <div class="receipt-row">
        <span class="receipt-label">Bib Number</span>
        <span class="receipt-value mono" id="r-bib2">—</span>
      </div>
      <div class="receipt-row">
        <span class="receipt-label">Finish Time</span>
        <span class="receipt-value mono" id="r-time2">—</span>
      </div>
      <div class="receipt-row">
        <span class="receipt-label">VAR Status</span>
        <span class="receipt-value" id="r-status">—</span>
      </div>
      <div class="receipt-row" id="tshirt-row" style="display:none">
        <span class="receipt-label">T-Shirt Order</span>
        <span class="receipt-value" style="color:var(--green)">✓ $5 — collect at exit</span>
      </div>
      <div class="receipt-row">
        <span class="receipt-label">IR Depth</span>
        <span class="receipt-value" id="r-depth">—</span>
      </div>

      <div id="clip-area"></div>

      <div class="share-actions no-print">
        <button class="btn btn-red" onclick="window.print()">
          🖨 Print
        </button>
        <button class="btn btn-blue" id="btn-share">
          📤 Share
        </button>
        <a class="btn btn-gray" href="/results" style="text-decoration:none">
          📊 Results
        </a>
      </div>
    </div>
  </div>
</div>

<script src="/static/app.js"></script>
<script>
async function loadReceipt() {
  const parts = window.location.pathname.split('/').filter(Boolean);
  const eventId = parseInt(parts[parts.length - 1]);
  if (isNaN(eventId)) {
    document.getElementById('loading').innerHTML = '<div style="color:var(--red)">Invalid receipt URL.</div>';
    return;
  }

  try {
    const data = await api('GET', `/finish_events/${eventId}`);
    renderReceipt(data);
  } catch (err) {
    document.getElementById('loading').innerHTML = `<div style="color:var(--red)">Error: ${err.message}</div>`;
  }
}

function renderReceipt(d) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('receipt-card').style.display = 'block';

  const runner = d.runner || {};

  document.getElementById('r-bib').textContent      = d.bib_number;
  document.getElementById('r-bib2').textContent     = d.bib_number;
  document.getElementById('r-time').textContent     = d.finish_time || '—';
  document.getElementById('r-time2').textContent    = d.finish_time || '—';
  document.getElementById('r-name').textContent     = runner.name || '—';
  document.getElementById('r-cat').innerHTML        = catBadge(runner.category);
  document.getElementById('r-status').innerHTML     = statusBadge(d.status);
  document.getElementById('r-depth').textContent    = fmtDepth(d.depth_mm) + (d.depth_ok ? ' ✓' : ' ⚠');
  document.getElementById('r-validated').textContent =
    d.validated_at ? 'Validated ' + new Date(d.validated_at).toLocaleTimeString() : 'Pending validation';

  if (d.rank) {
    const medals = ['🥇','🥈','🥉'];
    document.getElementById('r-rank').textContent =
      `${medals[d.rank - 1] || '#' + d.rank} Overall rank ${d.rank}`;
  }

  if (runner.tshirt) {
    document.getElementById('tshirt-row').style.display = 'flex';
  }

  if (d.video_path) {
    document.getElementById('clip-area').innerHTML = `
      <a class="clip-link" href="${d.video_path}" target="_blank">
        ▶ Watch 5-second finish clip
      </a>`;
  }
  if (d.photo_path) {
    document.getElementById('clip-area').insertAdjacentHTML('beforeend', `
      <img src="${d.photo_path}" alt="Finish photo"
           style="width:100%;border-radius:8px;margin-top:12px;object-fit:cover;max-height:200px">`);
  }
}

// Share button
document.getElementById('btn-share').addEventListener('click', async () => {
  const url = window.location.href;
  if (navigator.share) {
    try {
      await navigator.share({
        title: '🏅 Big Red Race — Finish Receipt',
        text: 'Check out my race finish time!',
        url
      });
    } catch {}
  } else {
    try {
      await navigator.clipboard.writeText(url);
      notify('Link Copied', 'Receipt URL copied to clipboard.', 'var(--green)');
    } catch {
      notify('Share', 'Copy this link: ' + url);
    }
  }
});

loadReceipt();
</script>
</body>
</html>
