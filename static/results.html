<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Live Results · Big Red Command Center</title>
  <meta name="description" content="Real-time race results with live WebSocket updates and category breakdowns.">
  <link rel="stylesheet" href="/static/styles.css">
  <style>
    .photo-thumb {
      width: 44px; height: 44px;
      border-radius: 6px;
      object-fit: cover;
      border: 1px solid rgba(255,255,255,0.1);
      cursor: pointer;
      transition: transform 0.15s;
    }
    .photo-thumb:hover { transform: scale(1.8); z-index: 10; position: relative; }
    .no-photo { width: 44px; height: 44px; border-radius: 6px; background: rgba(255,255,255,0.04); display: flex; align-items: center; justify-content: center; font-size: 0.7rem; color: var(--muted); }
  </style>
</head>
<body>

<header class="header">
  <div class="live-dot"></div>
  <div>
    <div class="header-brand">🏁 BIG RED COMMAND CENTER</div>
    <div class="header-sub">Public Results Portal — pushed via 5G</div>
  </div>
  <nav class="nav">
    <a href="/">Dashboard</a>
    <a href="/checkin">Check-In</a>
    <a href="/var">VAR</a>
    <a href="/results" class="active">Results</a>
    <a href="/announcer">Announcer</a>
    <a href="/livestream">📺 Live</a>
    <a href="/phone/calibrate">📱 Phones</a>
  </nav>
</header>

<div class="container">

  <div class="results-header">
    <div class="results-title">🏅 LIVE RACE RESULTS</div>
    <div class="results-subtitle" id="race-time-display">Race clock: —</div>
    <div class="live-pill">
      <div class="dot dot-green"></div>
      LIVE — auto-refreshing
    </div>
  </div>

  <!-- Category tabs -->
  <div class="flex items-center justify-between" style="margin-bottom:20px;flex-wrap:wrap;gap:12px">
    <div class="cat-tabs" style="margin-bottom:0">
      <button class="tab-btn active" onclick="setTab('all', this)">All</button>
      <button class="tab-btn" onclick="setTab('Students', this)">🎓 Students</button>
      <button class="tab-btn" onclick="setTab('Alumni', this)">🏛 Alumni</button>
      <button class="tab-btn" onclick="setTab('Parents', this)">👪 Parents</button>
    </div>
    <button class="btn btn-gray" id="btn-export" style="font-size:.82rem">📊 Export CSV</button>
  </div>

  <!-- Stats strip -->
  <div class="grid-4" style="margin-bottom:24px">
    <div class="card" style="animation-delay:0.05s">
      <div class="card-title">Finishers</div>
      <div class="metric green" id="s-finished">—</div>
    </div>
    <div class="card" style="animation-delay:0.1s">
      <div class="card-title">Students</div>
      <div class="metric blue" id="s-students">—</div>
    </div>
    <div class="card" style="animation-delay:0.15s">
      <div class="card-title">Alumni</div>
      <div class="metric" style="color:var(--green)" id="s-alumni">—</div>
    </div>
    <div class="card" style="animation-delay:0.2s">
      <div class="card-title">Parents</div>
      <div class="metric purple" id="s-parents">—</div>
    </div>
  </div>

  <!-- Content area -->
  <div id="content-area"></div>

</div>

<script src="/static/app.js"></script>
<script>
let currentTab = 'all';
let allResults = { Students: [], Alumni: [], Parents: [] };

function setTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderContent();
}

function getDisplayData() {
  if (currentTab === 'all') {
    const combined = [
      ...allResults.Students,
      ...allResults.Alumni,
      ...allResults.Parents,
    ].sort((a, b) => a.finish_ts - b.finish_ts)
     .map((r, i) => ({ ...r, rank: i + 1 }));
    return { all: combined };
  }
  return { [currentTab]: allResults[currentTab] };
}

function podiumHTML(runner) {
  const classes = ['gold','silver','bronze'];
  const trophies = ['🥇','🥈','🥉'];
  const cls = classes[runner.rank - 1] || '';
  const trophy = trophies[runner.rank - 1] || `#${runner.rank}`;
  return `
    <div class="podium-card ${cls}" style="animation-delay:${(runner.rank - 1) * 0.1}s">
      <div class="podium-rank">${trophy}</div>
      <div class="podium-bib">${runner.bib_number}</div>
      <div class="podium-name">${runner.name}</div>
      <div style="margin-top:4px">${catBadge(runner.category)}</div>
      <div class="podium-time">${runner.finish_time}</div>
    </div>`;
}

function categoryTableHTML(title, runners) {
  if (!runners.length) return '';
  const podium = runners.slice(0, 3);
  const rest   = runners.slice(3);

  return `
    <div class="cat-section">
      <div class="cat-section-title">${title}</div>
      ${podium.length ? `<div class="podium-row mt-16">${podium.map(podiumHTML).join('')}</div>` : ''}
      ${rest.length ? `
        <div class="card" style="padding:0;margin-top:0">
          <table>
            <thead>
              <tr><th>Rank</th><th>Bib</th><th>Bib Photo</th><th>Name</th><th>Category</th><th>Finish Time</th><th>Finish Photo</th></tr>
            </thead>
            <tbody>
              ${rest.map(r => `
                <tr>
                  <td class="rank-num">#${r.rank}</td>
                  <td class="bold mono">${r.bib_number}</td>
                  <td>${r.bib_photo ? `<img src="${r.bib_photo}" class="photo-thumb" alt="Bib">` : '<div class="no-photo">—</div>'}</td>
                  <td>${r.name}</td>
                  <td>${catBadge(r.category)}</td>
                  <td class="finish-time">${r.finish_time}</td>
                  <td>${r.photo_path ? `<img src="${r.photo_path}" class="photo-thumb" alt="Finish">` : '<div class="no-photo">—</div>'}</td>
                </tr>`).join('')}
            </tbody>
          </table>
        </div>` : ''}
    </div>`;
}

function renderContent() {
  const data = getDisplayData();
  const sections = Object.entries(data);
  let html = '';
  let anyData = false;

  for (const [key, runners] of sections) {
    if (runners.length) {
      anyData = true;
      const label = key === 'all' ? '🏁 Overall Standings' :
        key === 'Students' ? '🎓 Students' :
        key === 'Alumni' ? '🏛 Alumni' : '👪 Parents';
      html += categoryTableHTML(label, runners);
    }
  }

  if (!anyData) {
    html = `<div class="all-done">
      <div style="font-size:4rem;opacity:0.3">🏁</div>
      <div class="section-title mt-8">No finishers yet</div>
      <div style="color:var(--muted)">Results will appear here as runners cross the finish line.</div>
    </div>`;
  }

  document.getElementById('content-area').innerHTML = html;
}

async function loadResults() {
  try {
    const all = await api('GET', '/results/all');
    allResults = all;

    const total = all.Students.length + all.Alumni.length + all.Parents.length;
    animateNumber(document.getElementById('s-finished'), total);
    animateNumber(document.getElementById('s-students'), all.Students.length);
    animateNumber(document.getElementById('s-alumni'), all.Alumni.length);
    animateNumber(document.getElementById('s-parents'), all.Parents.length);

    renderContent();
  } catch (err) { console.error(err); }
}

async function loadClock() {
  try {
    const s = await api('GET', '/race/status');
    if (s.started) {
      document.getElementById('race-time-display').textContent =
        'Race clock: ' + s.elapsed_formatted;
    }
  } catch {}
}

// Export CSV
document.getElementById('btn-export').addEventListener('click', () => {
  const data = getDisplayData();
  const rows = [];
  for (const [key, runners] of Object.entries(data)) {
    runners.forEach(r => rows.push({
      Rank: r.rank,
      Bib: r.bib_number,
      Name: r.name,
      Category: r.category,
      'Finish Time': r.finish_time,
      'Elapsed (s)': r.elapsed_s,
      Status: r.status
    }));
  }
  if (rows.length) {
    downloadCSV(rows, `big_red_results_${currentTab}_${Date.now()}.csv`);
    notify('Export', `${rows.length} results exported to CSV`, 'var(--green)');
  } else {
    notify('Export', 'No results to export.', 'var(--orange)');
  }
});

// WebSocket
connectWS((msg) => {
  if (['var_accepted','var_overridden','race_started'].includes(msg.type)) {
    loadResults();
  }
});

// Init
loadResults();
loadClock();
setInterval(loadResults, 5000);
setInterval(loadClock, 1000);
</script>
</body>
</html>
