<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Live Results · Big Red</title>
  <link rel="stylesheet" href="/static/styles.css">
  <style>
    .results-header {
      text-align: center;
      padding: 32px 0 16px;
    }
    .results-title {
      font-size: 2rem;
      font-weight: 900;
      color: var(--red);
      letter-spacing: 2px;
    }
    .results-subtitle { color: var(--muted); font-size: .9rem; margin-top: 6px; }
    .live-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(0,200,81,.1);
      border: 1px solid var(--green);
      border-radius: 20px;
      padding: 4px 14px;
      font-size: .8rem;
      color: var(--green);
      margin-top: 10px;
    }
    .trophy { font-size: 1.4rem; }
    .rank-num {
      font-size: 1.2rem;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      min-width: 36px;
      text-align: center;
    }
    .finish-time {
      font-family: 'Courier New', monospace;
      font-size: 1rem;
      font-weight: 700;
      color: var(--green);
    }
    .cat-section { margin-bottom: 32px; }
    .cat-section-title {
      font-size: 1rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      padding: 10px 14px;
      border-left: 4px solid var(--red);
      margin-bottom: 0;
    }
    .all-done {
      text-align: center;
      padding: 60px 0;
      color: var(--muted);
    }
    .podium-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }
    .podium-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      text-align: center;
    }
    .podium-rank   { font-size: 2rem; font-weight: 900; }
    .podium-bib    { font-size: 2.5rem; font-weight: 900; color: var(--red); font-variant-numeric: tabular-nums; }
    .podium-name   { font-size: .95rem; margin-top: 6px; }
    .podium-time   { font-size: 1.1rem; font-weight: 700; color: var(--green); margin-top: 4px; font-family: monospace; }
    .podium-card.gold   { border-color: var(--gold);   }
    .podium-card.silver { border-color: var(--silver); }
    .podium-card.bronze { border-color: var(--bronze); }

    @media (max-width: 600px) {
      .podium-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header class="header">
  <div class="live-dot"></div>
  <div>
    <div class="header-brand">🏁 BIG RED COMMAND CENTER</div>
    <div class="header-sub">Public Results Portal — pushed via 5G</div>
  </div>
  <nav class="nav">
    <a href="/">Dashboard</a>
    <a href="/checkin">Check-In</a>
    <a href="/var">VAR</a>
    <a href="/results" class="active">Results</a>
  </nav>
</header>

<div class="container">

  <div class="results-header">
    <div class="results-title">🏅 LIVE RACE RESULTS</div>
    <div class="results-subtitle" id="race-time-display">Race clock: —</div>
    <div class="live-pill">
      <div class="dot dot-green"></div>
      LIVE — auto-refreshing
    </div>
  </div>

  <!-- Category tabs -->
  <div class="cat-tabs">
    <button class="tab-btn active" onclick="setTab('all', this)">All</button>
    <button class="tab-btn" onclick="setTab('Students', this)">🎓 Students</button>
    <button class="tab-btn" onclick="setTab('Alumni', this)">🏛 Alumni</button>
    <button class="tab-btn" onclick="setTab('Parents', this)">👨‍👩‍👧 Parents</button>
  </div>

  <!-- Overall stats strip -->
  <div class="grid-4 mb-0" style="margin-bottom:24px">
    <div class="card">
      <div class="card-title">Finishers</div>
      <div class="metric green" id="s-finished">—</div>
    </div>
    <div class="card">
      <div class="card-title">Students</div>
      <div class="metric blue" id="s-students">—</div>
    </div>
    <div class="card">
      <div class="card-title">Alumni</div>
      <div class="metric" style="color:#a5d6a7" id="s-alumni">—</div>
    </div>
    <div class="card">
      <div class="card-title">Parents</div>
      <div class="metric" style="color:#ce93d8" id="s-parents">—</div>
    </div>
  </div>

  <!-- Content area -->
  <div id="content-area"></div>

</div>

<script src="/static/app.js"></script>
<script>
let currentTab = 'all';
let allResults = { Students: [], Alumni: [], Parents: [] };

function setTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderContent();
}

function getDisplayData() {
  if (currentTab === 'all') {
    const combined = [
      ...allResults.Students,
      ...allResults.Alumni,
      ...allResults.Parents,
    ].sort((a, b) => a.finish_ts - b.finish_ts)
     .map((r, i) => ({ ...r, rank: i + 1 }));
    return { all: combined };
  }
  return { [currentTab]: allResults[currentTab] };
}

function podiumHTML(runner) {
  const classes = ['gold','silver','bronze'];
  const trophies = ['🥇','🥈','🥉'];
  const cls = classes[runner.rank - 1] || '';
  const trophy = trophies[runner.rank - 1] || `#${runner.rank}`;
  return `
    <div class="podium-card ${cls}">
      <div class="podium-rank">${trophy}</div>
      <div class="podium-bib">${runner.bib_number}</div>
      <div class="podium-name">${runner.name}</div>
      <div>${catBadge(runner.category)}</div>
      <div class="podium-time">${runner.finish_time}</div>
    </div>`;
}

function categoryTableHTML(title, runners) {
  if (!runners.length) return '';
  const podium = runners.slice(0, 3);
  const rest   = runners.slice(3);

  return `
    <div class="cat-section">
      <div class="cat-section-title">${title}</div>
      ${podium.length ? `<div class="podium-row mt-16">${podium.map(podiumHTML).join('')}</div>` : ''}
      ${rest.length ? `
        <div class="card" style="padding:0">
          <table>
            <thead>
              <tr><th>Rank</th><th>Bib</th><th>Name</th><th>Category</th><th>Finish Time</th></tr>
            </thead>
            <tbody>
              ${rest.map(r => `
                <tr>
                  <td class="rank-num">#${r.rank}</td>
                  <td class="bold mono">${r.bib_number}</td>
                  <td>${r.name}</td>
                  <td>${catBadge(r.category)}</td>
                  <td class="finish-time">${r.finish_time}</td>
                </tr>`).join('')}
            </tbody>
          </table>
        </div>` : ''}
    </div>`;
}

function renderContent() {
  const data = getDisplayData();
  const sections = Object.entries(data);
  let html = '';
  let anyData = false;

  for (const [key, runners] of sections) {
    if (runners.length) {
      anyData = true;
      const label = key === 'all' ? '🏁 Overall Standings' :
        key === 'Students' ? '🎓 Students' :
        key === 'Alumni' ? '🏛 Alumni' : '👨‍👩‍👧 Parents';
      html += categoryTableHTML(label, runners);
    }
  }

  if (!anyData) {
    html = `<div class="all-done">
      <div style="font-size:3rem">🏁</div>
      <div class="section-title mt-8">No finishers yet</div>
      <div>Results will appear here as runners cross the finish line.</div>
    </div>`;
  }

  document.getElementById('content-area').innerHTML = html;
}

async function loadResults() {
  try {
    const all = await api('GET', '/results/all');
    allResults = all;

    // Stats
    const total = all.Students.length + all.Alumni.length + all.Parents.length;
    document.getElementById('s-finished').textContent = total;
    document.getElementById('s-students').textContent = all.Students.length;
    document.getElementById('s-alumni').textContent   = all.Alumni.length;
    document.getElementById('s-parents').textContent  = all.Parents.length;

    renderContent();
  } catch (err) { console.error(err); }
}

async function loadClock() {
  try {
    const s = await api('GET', '/race/status');
    if (s.started) {
      document.getElementById('race-time-display').textContent =
        'Race clock: ' + s.elapsed_formatted;
    }
  } catch {}
}

// ── WebSocket ──
connectWS((msg) => {
  if (['var_accepted','var_overridden','race_started'].includes(msg.type)) {
    loadResults();
  }
});

// ── Init ──
loadResults();
loadClock();
setInterval(loadResults, 5000);
setInterval(loadClock, 1000);
</script>
</body>
</html>
